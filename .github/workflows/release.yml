name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64
          - target: x86_64-apple-darwin
            arch: x64

    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.target }}

      - run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        with:
          args: --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: tudu-${{ matrix.arch }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: 'Tudu ${{ github.event.inputs.tag || github.ref_name }}'
          draft: false
          prerelease: false
          files: artifacts/**/*
          body: |
            macOS build (arm64 + x64).

            **Install**
            1. Download the `.dmg` for your Mac (arm64 for Apple Silicon, x64 for Intel).
            2. Drag `Tudu.app` to Applications.
            3. Unsigned build — if Gatekeeper refuses to open it, run:
               ```
               xattr -cr /Applications/Tudu.app
               ```
