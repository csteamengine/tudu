name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true

jobs:
  build:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64
          - target: x86_64-apple-darwin
            arch: x64

    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.target }}

      - run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: 'Tudu ${{ github.event.inputs.tag || github.ref_name }}'
          releaseBody: |
            macOS ${{ matrix.arch }} build.

            **Install**
            1. Download the `.dmg` for your Mac (arm64 for Apple Silicon, x64 for Intel).
            2. Drag `Tudu.app` to Applications.
            3. Unsigned build — if Gatekeeper refuses to open it, run:
               ```
               xattr -cr /Applications/Tudu.app
               ```
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
